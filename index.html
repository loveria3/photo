<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 우도순례 사진 콘테스트 v.5</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: #F7F5F0; color: #333; font-family: 'Pretendard', sans-serif; padding-bottom: 60px; }

/* 로딩 화면 */
#loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.spinner { border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* 헤더 및 프로그레스 */
.header-board { background: #ffffff; padding: 30px 20px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.04); border-bottom: 1px solid #eaeaea; }
.header-title { color: #2c3e50; font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800; margin-bottom: 8px; }
.header-sub { color: #7f8c8d; font-size: clamp(0.9rem, 2.5vw, 1.1rem); font-weight: 500; }
.progress-wrapper { max-width: 600px; margin: 24px auto 10px; text-align: center; padding: 0 20px; }
.progress-bar-bg { background: #e0ded9; border-radius: 20px; height: 12px; overflow: hidden; }
.progress-bar-fill { background: linear-gradient(90deg, #4facfe, #00f2fe); height: 100%; width: 0%; transition: width 0.4s; }

/* 탭 버튼 */
.tabs { display: flex; justify-content: center; gap: 12px; margin: 30px 20px 20px; flex-wrap: wrap; }
.tab-btn { background: #ffffff; border: 1px solid #dcdcdc; border-radius: 30px; padding: 12px 32px; font-size: 1.1rem; font-weight: 600; color: #7f8c8d; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: #2c3e50; color: #ffffff; }

/* 📸 3x3 그리드 및 스마트 프레임 */
.photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1000px; margin: 20px auto; padding: 20px; }
.photo-card { background: #ffffff; padding: 12px; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,0.06); transition: transform 0.2s; }

/* 💡 스마트 프레임 핵심 스타일 */
.photo-img-wrap { width: 100%; border-radius: 4px; background: #f1f2f6; overflow: hidden; position: relative; }
.photo-img-wrap.landscape { aspect-ratio: 4/3; }
.photo-img-wrap.portrait { aspect-ratio: 3/4; }
.photo-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(1.04) contrast(1.03); }

/* 스티커 및 버튼 */
.sticker-area { display: flex; justify-content: center; gap: 6px; margin-top: 15px; }
.sticker-btn { background: #f8f9fa; border: 1px solid #eee; border-radius: 20px; padding: 5px 10px; cursor: pointer; }
.sticker-btn.voted { background: #fff3cd; border-color: #ffc107; }
.bottom-area { text-align: center; margin-top: 40px; }
.btn { border: none; border-radius: 30px; padding: 14px 32px; font-weight: 700; cursor: pointer; margin: 5px; }

/* 반응형 */
@media (max-width: 900px) { .photos-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .photos-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div>데이터를 불러오는 중입니다...</div></div>

<div class="header-board">
  <div class="header-title">📸 복사단 우도순례 사진 콘테스트</div>
  <div class="header-sub">v.4.0 (스마트 프레임 탑재)</div>
</div>

<div class="progress-wrapper">
  <div id="progress-text">현재 투표 참여 현황: 0 / 50명</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar-fill"></div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-landscape" onclick="switchTab('landscape', this)">🌿 풍경사진</button>
  <button class="tab-btn" id="tab-portrait" onclick="switchTab('portrait', this)">👧 인물사진</button>
</div>

<div id="section-landscape" class="board-section active"><div id="grid-landscape" class="photos-grid"></div></div>
<div id="section-portrait" class="board-section"><div id="grid-portrait" class="photos-grid"></div></div>

<div class="bottom-area">
  <button class="btn" style="background:#ff7675; color:white;" onclick="openResult()">🏆 결과 보기</button>
  <button class="btn" style="background:#636e72; color:white;" onclick="openAdmin()">🛠️ 관리</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-5v2AAYuRMdekIdF3TExGaZhdbJ-IKQphJCHvqKeQpV9iXUhLOoITYiP04wW0JRv6/exec';
const CHILDREN = ['양솔','이건우','박지수','김호현','좌시안','남아영','윤아성','박다온','신지민'];
const STICKERS = ['⭐','💖','🎉','✨'];
let globalVotes = {};
let shuffledIndices = { landscape: [], portrait: [] };

// 💡 사진 비율 감지 및 프레임 클래스 할당
function setSmartFrame(img, wrap) {
  img.onload = () => {
    wrap.className = (img.naturalHeight > img.naturalWidth) ? 'photo-img-wrap portrait' : 'photo-img-wrap landscape';
  };
}

async function loadDataFromDB() {
  const res = await fetch(SCRIPT_URL);
  globalVotes = JSON.parse(await res.text() || "{}");
  document.getElementById('loading-overlay').style.display = 'none';
  initShuffle();
  renderGrids();
}

function initShuffle() {
  ['landscape', 'portrait'].forEach(cat => {
    shuffledIndices[cat] = CHILDREN.map((_, i) => i).sort(() => Math.random() - 0.5);
  });
}

function renderGrid(cat) {
  const grid = document.getElementById('grid-' + cat);
  grid.innerHTML = '';
  shuffledIndices[cat].forEach(i => {
    const pid = cat + '_' + i;
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.innerHTML = `
      <div class="photo-img-wrap" id="wrap-${pid}">
        <img src="photos/${cat}_${i+1}.jpg" onload="setSmartFrame(this, document.getElementById('wrap-${pid}'))">
      </div>
      <div class="sticker-area">
        ${STICKERS.map(e => `<button class="sticker-btn" onclick="vote('${pid}', '${e}', '${cat}')">${e}</button>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });
}

// 나머지 투표 로직, openResult, openAdmin 등은 기존의 v.3.3 로직을 그대로 사용하시면 됩니다!
// (이 스크립트 아래에 선생님의 이전 로직을 붙여넣으세요)

window.onload = loadDataFromDB;
</script>
</body>
</html>
